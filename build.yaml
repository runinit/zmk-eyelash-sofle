---
include:
  # Dongle (central) - SuperMini nRF52840 over USB. Hosts ZMK Studio.
  - board: nice_nano_v2
    shield: eyelash_sofle_dongle
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_STUDIO_LOCKING=n
  # Left half (demoted to peripheral via cmake-args; dongle is now central)
  - board: nice_nano_v2
    shield: eyelash_sofle_left nice_view
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
  # Right half (peripheral, unchanged)
  - board: nice_nano_v2
    shield: eyelash_sofle_right nice_view
  # Settings reset (flash onto each device before pairing)
  - board: nice_nano_v2
    shield: settings_reset
